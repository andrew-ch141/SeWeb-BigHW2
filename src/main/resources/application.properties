spring.application.name=book-recommendation-homework
server.port=8080
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

app.rdf.path=src/main/resources/data/book-recommendations.rdf
app.rdf.base-uri=http://example.org/books#

app.elasticsearch.url=${ELASTICSEARCH_URL:http://localhost:9200}
app.elasticsearch.index=semantic-books
app.llm.base-url=${LLM_BASE_URL:http://localhost:1234/v1}
app.llm.api-key=${LLM_API_KEY:lm-studio}
app.llm.chat-model=${LLM_CHAT_MODEL:local-chat-model}
app.llm.embedding-model=${LLM_EMBEDDING_MODEL:text-embedding-nomic-embed-text-v1.5}
app.llm.embedding-dimensions=${LLM_EMBEDDING_DIMENSIONS:768}
